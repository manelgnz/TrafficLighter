<div class="table-container">
  <h2>Statistics</h2>
  <table>
    <thead>
      <tr>
        <th *ngFor="let col of columns">{{ col }}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of rows">
        <td>{{ row.id }}</td>
        <td>{{ row.start_time }}</td>
        <td>{{ row.stop_time }}</td>
        <td>{{ row.duration }}</td> 
      </tr>
    </tbody>
  </table>
</div>
